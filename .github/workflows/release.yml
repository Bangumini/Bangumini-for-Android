name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Get version
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "::error::Git tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-35
            build-tools;35.0.0
            ndk;26.1.10909125

      - run: npm ci

      - name: Expo prebuild (generate native project)
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Missing GitHub secret ANDROID_RELEASE_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build APK
        env:
          ANDROID_RELEASE_STORE_FILE: release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          for name in ANDROID_RELEASE_STORE_PASSWORD ANDROID_RELEASE_KEY_ALIAS ANDROID_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret $name"
              exit 1
            fi
          done
          cd android && ./gradlew assembleRelease

      - name: Create latest.json
        run: |
          cat > latest.json <<'JSON'
          {"version":"${{ steps.meta.outputs.version }}","url":"https://github.com/Bangumini/Bangumini-for-Android/releases/download/v${{ steps.meta.outputs.version }}/Bangumini-for-Android-${{ steps.meta.outputs.version }}.apk"}
          JSON

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk "Bangumini-for-Android-${{ steps.meta.outputs.version }}.apk"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: "v${{ steps.meta.outputs.version }}"
          name: "Bangumini-for-Android v${{ steps.meta.outputs.version }}"
          body: |
            适用于 Android arm64-v8a 设备。

            ## 安装
            下载 APK 文件后直接安装即可。
          files: |
            Bangumini-for-Android-*.apk
            latest.json
